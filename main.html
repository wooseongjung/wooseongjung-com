<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wooseong Jung</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
            --border-color: #30363d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 400px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 24px;
        }

        .btn {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            background-color: #1f6feb;
        }

        .btn:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        #user-info {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome</h1>
        <p>hello world wooseong jung is here</p>
        <p id="status-text">Please sign in to continue.</p>

        <button id="auth-btn" class="btn">Sign In with Google</button>

        <div id="user-info">
            <p>Signed in as: <br><strong id="user-email"></strong></p>
        </div>
    </div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // TODO: Replace with your Firebase config object!
        const firebaseConfig = {
            apiKey: "AIzaSyAFqfyOMjvVQrgITIUOA8ktYzghHbq3OvA",
            authDomain: "wooseongjung-5f089.firebaseapp.com",
            projectId: "wooseongjung-5f089",
            storageBucket: "wooseongjung-5f089.firebasestorage.app",
            messagingSenderId: "618389572385",
            appId: "1:618389572385:web:6d913485e87c455b4f0c60",
            measurementId: "G-FVYNF66XQ9"
        };

        // Initialize Firebase
        try {
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const provider = new GoogleAuthProvider();

                const authBtn = document.getElementById('auth-btn');
                const statusText = document.getElementById('status-text');
                const userInfo = document.getElementById('user-info');
                const userEmail = document.getElementById('user-email');

                authBtn.addEventListener('click', () => {
                    if (auth.currentUser) {
                        signOut(auth).catch((error) => console.error("Sign out error", error));
                    } else {
                        signInWithPopup(auth, provider).catch((error) => console.error("Sign in error", error));
                    }
                });

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        authBtn.textContent = 'Sign Out';
                        statusText.textContent = 'Welcome back!';
                        userEmail.textContent = user.email;
                        userInfo.style.display = 'block';
                    } else {
                        authBtn.textContent = 'Sign In with Google';
                        statusText.textContent = 'Please sign in to continue.';
                        userInfo.style.display = 'none';
                    }
                });
            } else {
                document.getElementById('auth-btn').onclick = () => alert("Please update firebaseConfig in main.html first!");
                document.getElementById('status-text').textContent = "Awaiting Firebase Configure...";
                console.warn("Please replace firebaseConfig in main.html with your actual Firebase config.");
            }
        } catch (error) {
            console.error("Firebase Initialization Error", error);
        }
    </script>
</body>

</html>
